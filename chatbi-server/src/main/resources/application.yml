server:
  port: 8090

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/chatbi
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

langchain4j:
  open-ai:
    chat-model:
      api-key: ${DASHSCOPE_API_KEY:sk-e1039fac3e9047c7a7b1457aff8dcbee}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen-plus
      temperature: 0.1
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: ${DASHSCOPE_API_KEY:sk-e1039fac3e9047c7a7b1457aff8dcbee}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen-plus
      temperature: 0.1
    embedding-model:
      api-key: ${DASHSCOPE_API_KEY:sk-e1039fac3e9047c7a7b1457aff8dcbee}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v3
      dimensions: 1024

mcp:
  server:
    url: ${MCP_SERVER_URL:http://localhost:8000/mcp}
    transport: ${MCP_SERVER_TRANSPORT:streamable-http}
    timeout: ${MCP_SERVER_TIMEOUT:30s}
    log-requests: ${MCP_SERVER_LOG_REQUESTS:true}
    log-responses: ${MCP_SERVER_LOG_RESPONSES:true}

observability:
  langfuse:
    enabled: ${LANGFUSE_ENABLED:false}
    host: ${LANGFUSE_HOST:https://cloud.langfuse.com}
    public-key: ${LANGFUSE_PUBLIC_KEY:}
    secret-key: ${LANGFUSE_SECRET_KEY:}
    otlp-endpoint: ${LANGFUSE_OTLP_ENDPOINT:}
    environment: ${LANGFUSE_ENVIRONMENT:development}
    service-name: ${LANGFUSE_SERVICE_NAME:chatbi-server}
    service-version: ${CHATBI_RELEASE:local}

jwt:
  secret: ${JWT_SECRET:ChatBI2026DefaultDevSecretKeyMustBeReplacedInProduction!!}
  expiration: 86400000

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
  level:
    com.chatbi: debug
    dev.langchain4j: debug
