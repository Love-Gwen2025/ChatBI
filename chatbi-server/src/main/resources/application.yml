server:
  port: 8090

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/chatbi
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

langchain4j:
  open-ai:
    chat-model:
      api-key: ${DASHSCOPE_API_KEY:sk-e1039fac3e9047c7a7b1457aff8dcbee}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen-plus
      temperature: 0.1
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: ${DASHSCOPE_API_KEY:sk-e1039fac3e9047c7a7b1457aff8dcbee}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen-plus
      temperature: 0.1
    embedding-model:
      api-key: ${DASHSCOPE_API_KEY:sk-e1039fac3e9047c7a7b1457aff8dcbee}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v3
      dimensions: 1024

mcp:
  server:
    url: ${MCP_SERVER_URL:http://localhost:8000/sse}

jwt:
  secret: ${JWT_SECRET:ChatBI2026DefaultDevSecretKeyMustBeReplacedInProduction!!}
  expiration: 86400000

logging:
  level:
    com.chatbi: debug
    dev.langchain4j: debug
