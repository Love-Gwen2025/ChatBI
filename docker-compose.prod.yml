# ChatBI 生产部署 - Docker Compose
# 使用方法: cp .env.example .env && docker compose -f docker-compose.prod.yml up -d
# 网络: 统一使用 1panel-network 外部网络

services:
  # ---------- 基础设施 ----------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbi-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-chatbi}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - 1panel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbi-redis
    volumes:
      - redisdata:/data
    networks:
      - 1panel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- MCP Server ----------
  mcp-server:
    image: ghcr.io/love-gwen2025/mcp-server:master
    container_name: chatbi-mcp
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - DB_HOST=chatbi-postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-chatbi}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v3}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_ENVIRONMENT=${LANGFUSE_ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - 1panel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/sse')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------- 后端 ----------
  chatbi-server:
    image: ghcr.io/love-gwen2025/chatbi-server:main
    container_name: chatbi-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://chatbi-postgres:5432/${DB_NAME:-chatbi}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-postgres}
      - SPRING_DATA_REDIS_HOST=chatbi-redis
      - SPRING_DATA_REDIS_PORT=6379
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MCP_SERVER_URL=http://chatbi-mcp:8000/mcp
      - MCP_SERVER_TRANSPORT=streamable-http
      - JWT_SECRET=${JWT_SECRET}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_ENVIRONMENT=${LANGFUSE_ENVIRONMENT:-production}
      - CHATBI_RELEASE=${CHATBI_RELEASE:-main}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_started
    networks:
      - 1panel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------- 前端 ----------
  chatbi-web:
    image: ghcr.io/love-gwen2025/chatbi-web:main
    container_name: chatbi-web
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - chatbi-server
    networks:
      - 1panel-network
    restart: unless-stopped

networks:
  1panel-network:
    external: true

volumes:
  pgdata:
  redisdata:
