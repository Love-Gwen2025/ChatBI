# ChatBI 生产部署 - Docker Compose
# 使用方法: cp .env.example .env && docker compose -f docker-compose.prod.yml up -d

services:
  # ---------- 基础设施 ----------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbi-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-chatbi}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatbi-redis
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- MCP Server ----------
  mcp-server:
    image: ghcr.io/love-gwen2025/mcp-server:latest
    container_name: chatbi-mcp
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-chatbi}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v3}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------- 后端 ----------
  chatbi-server:
    image: ghcr.io/love-gwen2025/chatbi-server:latest
    container_name: chatbi-server
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-chatbi}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-postgres}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MCP_SERVER_URL=http://mcp-server:8000/sse
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------- 前端 ----------
  chatbi-web:
    image: ghcr.io/love-gwen2025/chatbi-web:latest
    container_name: chatbi-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - chatbi-server
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
